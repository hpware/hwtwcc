<!doctype html>
<html>
    <head>
        <title>Photo Library Viewer - Howard's Website</title>
        <meta charset="utf-8">
        <meta content="width=device-width, initial-scale=1" name="viewport">
        <link rel="stylesheet" href="/style.css">
		<link href="/favicon.ico" type="image/x-icon" />
    </head>
    <style>
            img {
        width: 70%;
        height: 70%;
        margin: 0 auto 2rem;
        transition: filter 300ms;

    }
    img:hover {
        filter: drop-shadow(0 0 2em #4c4c4caa);
    }
    </style>
    <body>
        <main>
        <h1><a class="title" href="/">Howard's Website</a></h1>
	    <h2>Photo Viewer</h2>
        <p id="Display" style="color: red;"></p>
        <img id="imageviewer" src="" alt="Image Viewer">
        <br>
        <button style="border-radius:100px;" onclick="window.history.back()">Back</button>     
        <p class="ccwork">This image by Howard Wu is licensed under CC BY-NC-SA 4.0 </p>   
        </main>
        <footer>
        <br>
        <br>
            <a href="https://hwtw.cc">Home</a>&nbsp;&nbsp;<a href="https://hpware.hwtw.cc">Hpware</a>
            <p>Rebooted to Vercel</p>
            <p>&copy; 2024 Howard Wu</p>
        </footer>
    </body>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParam = new URL(window.location.href).searchParams.get("i");
        const dirParam = new URL(window.location.href).searchParams.get("d");
        const optParam = new URL(window.location.href).searchParams.get("opt");
        const imageViewer = document.getElementById('imageviewer');
        if (!optParam) {
            var optSize = "90%";
        }
        if (optParam) {
            var optSize = optParam + "%";
        }
        if (urlParam) {
            if (dirParam) {
                imageViewer.src = "https://files.yuanh.xyz/images/photolib/" + dirParam + "/" +urlParam + ".JPG";
                imageViewer.alt = "Image from" + dirParam;
                imageViewer.style.width = optSize;
            }
            else {
                imageViewer.src = "https://files.yuanh.xyz/images/photolib/" +urlParam + ".JPG";
                imageViewer.alt = "Image Viewer";
                imageViewer.style.width = optSize;
            }
        } else {
            document.getElementById('Display').innerHTML = "No image specified";
        }
    });
    </script>
</html>
